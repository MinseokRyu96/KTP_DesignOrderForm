<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>발주 관리 시스템</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="header-left">
        <h1>발주 관리 시스템</h1>
        <span class="header-sub">디자인물 발주 & 지출결의서 작성 도우미</span>
      </div>
      <button class="btn btn-primary" id="addItemBtn">+ 항목 추가</button>
    </header>

    <div class="filter-bar" id="filterBar">
      <div class="filter-row">
        <span class="filter-label">대분류</span>
        <div class="filter-pills" id="mainFilter">
          <button class="filter-pill active" data-main="">전체</button>
          <button class="filter-pill" data-main="매장">매장</button>
          <button class="filter-pill" data-main="호텔">호텔</button>
          <button class="filter-pill" data-main="병원">병원</button>
          <button class="filter-pill" data-main="약국">약국</button>
        </div>
      </div>
      <div class="filter-row" id="subFilterRow">
        <span class="filter-label">소분류</span>
        <div class="filter-pills" id="subFilter">
          <button class="filter-pill active" data-sub="">전체</button>
          <button class="filter-pill" data-sub="리플렛">리플렛</button>
          <button class="filter-pill" data-sub="와블러">와블러</button>
          <button class="filter-pill" data-sub="봉투">봉투</button>
          <button class="filter-pill" data-sub="스티커">스티커</button>
          <button class="filter-pill" data-sub="배너">배너</button>
          <button class="filter-pill" data-sub="POP">POP</button>
          <button class="filter-pill" data-sub="기타">기타</button>
        </div>
      </div>
    </div>

    <main class="main-content">
      <div class="items-grid" id="itemsGrid">
        <!-- items rendered here -->
      </div>
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">📋</div>
        <p>등록된 발주 항목이 없습니다.</p>
        <p class="empty-sub">우측 상단 "+ 항목 추가" 버튼을 눌러 시작하세요.</p>
      </div>
    </main>
  </div>

  <!-- 항목 추가/수정 모달 -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">항목 추가</h2>
        <button class="modal-close" id="modalClose">&times;</button>
      </div>
      <div class="modal-body">
        <form id="itemForm">
          <input type="hidden" id="itemId">

          <div class="form-row">
            <div class="form-group full">
              <label>품목명 <span class="required">*</span></label>
              <input type="text" id="itemName" placeholder="예: [자켓봉투] 공항웹 봉투 (실물영수증)" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group full">
              <label>대분류 <span class="hint">(복사 시 제외 · 다중 선택 가능)</span></label>
              <div class="cat-pill-group" id="itemMainCategory">
                <button type="button" class="cat-pill" data-value="매장">매장</button>
                <button type="button" class="cat-pill" data-value="호텔">호텔</button>
                <button type="button" class="cat-pill" data-value="병원">병원</button>
                <button type="button" class="cat-pill" data-value="약국">약국</button>
              </div>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group full">
              <label>소분류 <span class="hint">(복사 시 제외 · 다중 선택 가능)</span></label>
              <div class="cat-pill-group" id="itemSubCategory">
                <button type="button" class="cat-pill" data-value="리플렛">리플렛</button>
                <button type="button" class="cat-pill" data-value="와블러">와블러</button>
                <button type="button" class="cat-pill" data-value="봉투">봉투</button>
                <button type="button" class="cat-pill" data-value="스티커">스티커</button>
                <button type="button" class="cat-pill" data-value="배너">배너</button>
                <button type="button" class="cat-pill" data-value="POP">POP</button>
                <button type="button" class="cat-pill" data-value="기타">기타</button>
              </div>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group full">
              <label>참고 이미지 <span class="hint">(복사 시 제외됨)</span></label>
              <div class="image-upload-area" id="imageUploadArea">
                <input type="file" id="imageInput" accept="image/*" hidden>
                <div class="image-placeholder" id="imagePlaceholder">
                  <span class="upload-icon">🖼</span>
                  <p>클릭하여 이미지 업로드</p>
                  <p class="hint-text">JPG, PNG, GIF 지원</p>
                </div>
                <img id="imagePreview" src="" alt="미리보기" hidden>
                <button type="button" class="image-remove" id="imageRemove" hidden>✕ 이미지 제거</button>
              </div>
            </div>
          </div>

          <div class="form-row three-col">
            <div class="form-group">
              <label>수량 <span class="required">*</span></label>
              <input type="number" id="itemQty" placeholder="0" min="1" required>
            </div>
            <div class="form-group">
              <label>총 금액 (원) <span class="required">*</span></label>
              <input type="number" id="itemTotal" placeholder="0" min="0" required>
            </div>
            <div class="form-group">
              <label>단가 (원) <span class="hint">(자동 계산)</span></label>
              <input type="text" id="itemUnitPrice" placeholder="자동 계산" readonly class="readonly">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group full">
              <label>발주처 <span class="required">*</span></label>
              <input type="text" id="itemVendor" placeholder="예: 오프린트미, 성원애드피아" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group full">
              <label>발주 사이트 URL <span class="hint">(복사 시 포함)</span></label>
              <input type="url" id="itemUrl" placeholder="https://...">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group full">
              <label>주문 URL <span class="hint">(내부 관리용 · 복사 시 제외)</span></label>
              <input type="url" id="itemOrderUrl" placeholder="https://...">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group full">
              <label>옵션 / 상세 스펙</label>
              <textarea id="itemOptions" placeholder="카테고리, 규격, 용지, 인쇄도수 등 옵션을 입력하세요." rows="5"></textarea>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group full">
              <label>비고</label>
              <input type="text" id="itemNote" placeholder="추가 메모">
            </div>
          </div>

          <div class="form-divider"></div>

          <div class="form-row">
            <div class="form-group full">
              <label>배송 방식 <span class="required">*</span></label>
              <div class="delivery-toggle">
                <button type="button" class="delivery-btn active" id="deliveryOwnBtn" data-type="own">
                  🏢 자사 배송
                </button>
                <button type="button" class="delivery-btn" id="deliveryDirectBtn" data-type="direct">
                  🚚 직배송
                </button>
              </div>
              <input type="hidden" id="itemDeliveryType" value="own">
            </div>
          </div>

          <div class="delivery-fields" id="deliveryFields">
            <div class="delivery-fields-inner">
              <div class="delivery-hint">
                복사 시 아래 항목이 빈 칸으로 포함됩니다. 붙여넣기 후 직접 입력하세요.
                <div class="delivery-preview">
                  배송지 주소 :<br>
                  담당자명 :<br>
                  연락처 :
                </div>
              </div>
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="cancelBtn">취소</button>
        <button class="btn btn-primary" id="saveBtn">저장</button>
      </div>
    </div>
  </div>

  <!-- 삭제 확인 모달 -->
  <div class="modal-overlay" id="deleteOverlay">
    <div class="modal modal-sm">
      <div class="modal-header">
        <h2>항목 삭제</h2>
        <button class="modal-close" id="deleteClose">&times;</button>
      </div>
      <div class="modal-body">
        <p>이 항목을 삭제하시겠습니까?<br><strong id="deleteItemName"></strong></p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="deleteCancelBtn">취소</button>
        <button class="btn btn-danger" id="deleteConfirmBtn">삭제</button>
      </div>
    </div>
  </div>

  <!-- 발주내역 모달 -->
  <div class="modal-overlay" id="historyOverlay">
    <div class="modal modal-history">
      <div class="modal-header">
        <div>
          <h2 id="historyTitle">발주내역</h2>
          <p class="history-subtitle" id="historySubtitle"></p>
        </div>
        <button class="modal-close" id="historyClose">&times;</button>
      </div>
      <div class="modal-body">

        <!-- 발주 추가 폼 -->
        <div class="history-form" id="historyForm">
          <div class="history-form-title" id="historyFormTitle">+ 새 발주 추가</div>
          <div class="history-form-fields" id="historyFormFields">
            <input type="hidden" id="historyEditId">
            <div class="hform-row">
              <div class="hform-group">
                <label>발주일 <span class="required">*</span></label>
                <input type="date" id="hOrderDate">
              </div>
              <div class="hform-group">
                <label>개수 <span class="required">*</span></label>
                <input type="number" id="hQty" placeholder="0" min="1">
              </div>
              <div class="hform-group">
                <label>총금액 (원)</label>
                <input type="number" id="hTotal" placeholder="0" min="0">
              </div>
              <div class="hform-group">
                <label>단가 (원)</label>
                <input type="text" id="hUnitPrice" placeholder="자동 계산" readonly class="readonly">
              </div>
            </div>
            <div class="hform-row">
              <div class="hform-group full">
                <label>발주 목적</label>
                <input type="text" id="hPurpose" placeholder="예: 신규 매장 오픈, 재고 보충">
              </div>
            </div>
            <div class="hform-actions">
              <button class="btn btn-ghost btn-sm" id="hCancelBtn">취소</button>
              <button class="btn btn-primary btn-sm" id="hSaveBtn">저장</button>
            </div>
          </div>
        </div>

        <!-- 발주내역 리스트 -->
        <div class="history-list" id="historyList">
          <div class="history-empty" id="historyEmpty">아직 발주 내역이 없습니다.</div>
        </div>

      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" id="historyAddBtn">+ 발주 추가</button>
        <button class="btn btn-ghost" id="historyDoneBtn">닫기</button>
      </div>
    </div>
  </div>

  <!-- 다중 선택 복사 바 -->
  <div class="select-bar" id="selectBar">
    <span class="select-count" id="selectCount">0개 선택됨</span>
    <div class="select-bar-actions">
      <button class="btn btn-ghost" id="selectClearBtn">선택 해제</button>
      <button class="btn btn-copy" id="selectCopyBtn">📋 선택 항목 복사</button>
    </div>
  </div>

  <!-- 복사 완료 토스트 -->
  <div class="toast" id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
